<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Wstyle.css">
    <title>Search</title>
    <style>
        body {
            /* background-image: linear-gradient(to top, #9795f0 0%, #fbc8d4 100%); */
            overflow: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .search-box {
            width: 60vw;
            max-width: 600px;
            margin: 20px;
        }

        .search-box input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 1.2em;
            border: 2px solid #ccc;
            border-radius: 4px;
        }

        .search-box button {
            padding: 10px 20px;
            font-size: 1.2em;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .search-box button:hover {
            background-color: #45a049;
        }
    </style>
    <script>
        function searchAthlete() {
            const query = document.getElementById('search-input').value.toLowerCase();
            if (query.includes('马龙')) {
                window.location.href = 'athlete.html#malong';
            } else if (query.includes('博尔特')) {
                window.location.href = 'athlete.html#bolt';
            } else if (query.includes('刘翔')) {
                window.location.href = 'athlete.html#liuxiang';
            } else {
                alert('未找到相关运动员');
            }
        }
    </script>
</head>

<body>
    <header>
        <h1>Search Athletes</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="search.html">搜索</a></li>
                <li><a href="html/event.html">赛事记录</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="输入运动员姓名">
                <button type="button" onclick="searchAthlete()">搜索</button>
            </div>
        </div>
    </main>

    <footer>
        <p>©2024 Search. All rights reserved.</p>
    </footer>
</body>

</html>
